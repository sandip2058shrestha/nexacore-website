<svg xmlns="http://www.w3.org/2000/svg" width="500" height="340" viewBox="0 0 500 340" role="img">

  <defs>
    <linearGradient id="g4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00e5ff;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0.08"/>
    </linearGradient>
  </defs>
  <rect width="500" height="340" fill="#0d1117"/>
  <rect width="500" height="340" fill="url(#g4)"/>
  <!-- Map-like background grid -->
  <g stroke="#30363d" stroke-width="0.5" opacity="0.5">
    <line x1="0" y1="60" x2="500" y2="60"/>
    <line x1="0" y1="120" x2="500" y2="120"/>
    <line x1="0" y1="180" x2="500" y2="180"/>
    <line x1="0" y1="240" x2="500" y2="240"/>
    <line x1="0" y1="300" x2="500" y2="300"/>
    <line x1="60" y1="0" x2="60" y2="340"/>
    <line x1="150" y1="0" x2="150" y2="340"/>
    <line x1="250" y1="0" x2="250" y2="340"/>
    <line x1="350" y1="0" x2="350" y2="340"/>
    <line x1="440" y1="0" x2="440" y2="340"/>
  </g>
  <!-- Location pin -->
  <circle cx="250" cy="150" r="60" fill="#161b22" stroke="#00e5ff" stroke-width="2" opacity="0.9"/>
  <circle cx="250" cy="150" r="40" fill="#21262d" opacity="0.9"/>
  <path d="M250 110 C230 110 215 125 215 145 C215 165 250 190 250 190 C250 190 285 165 285 145 C285 125 270 110 250 110Z" fill="none" stroke="#00e5ff" stroke-width="2.5"/>
  <circle cx="250" cy="145" r="8" fill="#00e5ff"/>
  <!-- Pulse rings -->
  <circle cx="250" cy="150" r="75" fill="none" stroke="#00e5ff" stroke-width="1" opacity="0.3"/>
  <circle cx="250" cy="150" r="95" fill="none" stroke="#00e5ff" stroke-width="0.5" opacity="0.15"/>
  <!-- Address card -->
  <rect x="130" y="225" width="240" height="85" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="250" y="248" font-family="sans-serif" font-size="13" font-weight="bold" fill="#e6edf3" text-anchor="middle">NexaCore HQ</text>
  <text x="250" y="266" font-family="sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">Level 12, 1 Market St</text>
  <text x="250" y="282" font-family="sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">Sydney NSW 2000</text>
  <text x="250" y="300" font-family="sans-serif" font-size="11" fill="#00e5ff" text-anchor="middle">hello@nexacore.io</text>

